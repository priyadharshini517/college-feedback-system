<!DOCTYPE html>
<html>
<head>
  <title>Campus Insight Engine</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      text-align: center;
      color: white;
    }

    .header {
      margin-top: 20px;
    }

    .header img {
      width: 60px;
    }

    .container {
      width: 350px;
      margin: auto;
      background: white;
      padding: 20px;
      margin-top: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      color: black;
    }

    input, select, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #0056b3;
    }
  </style>

</head>

<body>

  <!-- 🔥 HEADER -->
  <div class="header">

    <img src="C:\Users\priya\Downloads\cahcet_in_logo.jpg">

    <h1 style="margin:5px 0; font-weight:bold;">
      C. Abdul Hakeem College of Engineering and Technology
    </h1>

    <h3 style="margin:0;">
      Campus Insight Engine
    </h3>

  </div>

  <!-- 🔥 FORM -->
  <div class="container">

    <form id="feedbackForm">

      <input type="text" id="name" placeholder="Your Name" required>

      <select id="department" required>
        <option value="">Select Department</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
        <option value="MECH">MECH</option>
        <option value="CIVIL">CIVIL</option>
      </select>

      <select id="category" required>
        <option value="">Select Category</option>
        <option value="Canteen">Canteen</option>
        <option value="Library">Library</option>
        <option value="Lab">Lab</option>
        <option value="Classroom">Classroom</option>
        <option value="Transport">Transport</option>
        <option value="Hostel">Hostel</option>
        <option value="Teaching">Teaching</option>
      </select>

      <textarea id="feedback" placeholder="Enter your feedback" required></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </div>

  <!-- 🔥 JS CONNECT -->
  <script src="script.js"></script>

</body>
</html>
