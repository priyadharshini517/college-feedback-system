<!DOCTYPE html>
<html>
<head>
  <title>College Feedback System</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }

    .container {
      width: 350px;
      margin: auto;
      background: white;
      padding: 20px;
      margin-top: 50px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input, select, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    img {
      margin-bottom: 10px;
    }
  </style>

</head>

<body>

  <div class="container">

    <!-- 🔥 LOGO (image file same folder la irukanum) -->
    <img src="C:\Users\priya\Downloads\cahcet_in_logo.jpg" width="80">

    <h2>College Feedback System</h2>

    <form id="feedbackForm">

      <input type="text" id="name" placeholder="Your Name" required>

      <select id="department" required>
        <option value="">Select Department</option>
        <option value="CSE">CSE</option>
        <option value="IT">IT</option>
        <option value="ECE">ECE</option>
        <option value="EEE">EEE</option>
      </select>

      <select id="category" required>
        <option value="">Select Category</option>
        <option value="Canteen">Canteen</option>
        <option value="Library">Library</option>
        <option value="Lab">Lab</option>
        <option value="Classroom">Classroom</option>
      </select>

      <textarea id="feedback" placeholder="Enter your feedback" required></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </div>

  <!-- 🔥 JS connect -->
  <script src="script.js"></script>

</body>
</html>
